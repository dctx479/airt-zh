
services:
  ollama:
    image: ollama/ollama:latest
    container_name: lab05-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama-setup:
    image: curlimages/curl:latest
    container_name: lab05-ollama-setup
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"mistral:7b-instruct-q4_0\"}' && echo 'Model ready'"
    restart: "no"

  model-registry:
    build:
      context: ./scripts
      dockerfile: Dockerfile
    container_name: lab05-model-registry
    ports:
      - "5000:5000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - model_store:/app/models

  jupyter:
    image: jupyter/minimal-notebook:latest
    container_name: lab05-jupyter
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_TOKEN=redteam
    volumes:
      - ./scripts:/home/jovyan/work

volumes:
  ollama_data:
  model_store:
