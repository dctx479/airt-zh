
services:
  ollama:
    image: ollama/ollama:latest
    container_name: lab07-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama-setup:
    image: curlimages/curl:latest
    container_name: lab07-ollama-setup
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"mistral:7b-instruct-q4_0\"}' && echo 'Model ready'"
    restart: "no"

  redteam-tools:
    build:
      context: ./configs
      dockerfile: Dockerfile.tools
    container_name: lab07-redteam-tools
    volumes:
      - ./configs:/app/configs
      - ./results:/app/results
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    command: ["tail", "-f", "/dev/null"]

  target-app:
    build:
      context: ./configs
      dockerfile: Dockerfile.target
    container_name: lab07-target-app
    ports:
      - "5000:5000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
