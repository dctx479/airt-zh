# GitHub Actions CI/CD 流水线用于 AI 安全测试
# 此工作流在每次 PR 和推送到 main 时运行自动化 AI 红队测试。
#
# 示例 - 适配到您的项目。演示如何将 garak 和 promptfoo
# 集成到 CI/CD 流水线中以进行持续的 AI 安全测试。

name: AI Security Red Team Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 每周一早上 6 点 UTC 运行每周安全扫描
    - cron: "0 6 * * 1"

env:
  OLLAMA_HOST: http://localhost:11434
  MODEL_NAME: mistral:7b-instruct-q4_0

jobs:
  ai-security-scan:
    name: AI Security Assessment
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
        options: >-
          --health-cmd "curl -f http://localhost:11434/api/tags || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull LLM model
        run: |
          curl -X POST http://localhost:11434/api/pull \
            -d "{\"name\": \"$MODEL_NAME\"}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install security testing tools
        run: |
          pip install garak requests
          npm install -g promptfoo

      # 运行 promptfoo 评估
      - name: Run promptfoo safety evaluation
        run: |
          promptfoo eval \
            --config configs/promptfoo_eval.yaml \
            --output results/promptfoo-results.json \
            --no-progress-bar
        continue-on-error: true

      # 运行 promptfoo 红队
      - name: Run promptfoo red team scan
        run: |
          promptfoo redteam run \
            --config configs/promptfoo_redteam.yaml \
            --output results/promptfoo-redteam.json \
            --no-progress-bar
        continue-on-error: true

      # 运行 garak 扫描
      - name: Run garak vulnerability scan
        run: |
          python -m garak \
            --model_type rest \
            --model_name $MODEL_NAME \
            --probes promptinject,encoding,dan \
            --report_prefix results/garak-scan
        continue-on-error: true

      # 收集并上传结果
      - name: Upload security scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-security-results
          path: results/
          retention-days: 30

      # 如果发现严重问题则使流水线失败
      - name: Check for critical vulnerabilities
        run: |
          echo "检查 promptfoo 结果..."
          if [ -f results/promptfoo-results.json ]; then
            FAILURES=$(python3 -c "
          import json
          with open('results/promptfoo-results.json') as f:
              data = json.load(f)
          failures = sum(1 for r in data.get('results', []) if not r.get('success', True))
          print(failures)
          ")
            echo "Promptfoo 失败数：$FAILURES"
            if [ "$FAILURES" -gt 5 ]; then
              echo "::error::严重：检测到 $FAILURES 个安全测试失败！"
              exit 1
            fi
          fi
          echo "安全扫描完成。查看工件以获取详细结果。"
